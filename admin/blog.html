<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Manager — Latisha Blake Admin</title>
  <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>
  <div class="admin-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Latisha Blake</h2>
        <p class="sidebar-subtitle">Admin</p>
      </div>
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-item">Dashboard</a>
        <a href="blog.html" class="nav-item active">Blog</a>
        <a href="sales.html" class="nav-item">Sales</a>
        <a href="leads.html" class="nav-item">Leads</a>
      </nav>
      <div class="sidebar-footer">
        <button class="logout-btn" onclick="logout()">Sign Out</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px;">
          <div>
            <h1>Blog Posts</h1>
            <p class="subtitle">Manage your real estate articles</p>
          </div>
          <button class="btn btn-primary" onclick="toggleNewPostForm()">+ New Post</button>
        </div>

        <!-- New/Edit Form -->
        <div id="postForm" class="form-section" style="display: none; margin-bottom: 32px;">
          <h2 style="margin-top: 0;">Create Post</h2>

          <form onsubmit="handleSavePost(event)">
            <div class="form-group">
              <label for="postTitle">Title</label>
              <input type="text" id="postTitle" placeholder="Enter post title" required>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="postCategory">Category</label>
                <select id="postCategory" required>
                  <option value="">Select a category</option>
                  <option value="Buying">Buying</option>
                  <option value="Selling">Selling</option>
                  <option value="Market Update">Market Update</option>
                </select>
              </div>

              <div class="form-group">
                <label for="postDate">Date Published</label>
                <input type="date" id="postDate" required>
              </div>
            </div>

            <div class="form-group">
              <label for="postExcerpt">Excerpt (2 lines)</label>
              <textarea id="postExcerpt" placeholder="Brief summary of your post" required style="min-height: 60px;"></textarea>
            </div>

            <div class="form-group">
              <label for="postBody">Full Content</label>
              <textarea id="postBody" placeholder="Write your full article here" required style="min-height: 200px;"></textarea>
            </div>

            <div class="btn-group">
              <button type="submit" class="btn btn-primary">Save Post</button>
              <button type="button" class="btn btn-secondary" onclick="toggleNewPostForm()">Cancel</button>
            </div>
          </form>
        </div>

        <!-- Posts List -->
        <div id="postsList">
          <div class="empty-state">
            <div class="empty-icon">📝</div>
            <div class="empty-title">No posts yet</div>
            <div class="empty-description">Create your first blog post to get started</div>
            <button class="btn btn-primary" onclick="toggleNewPostForm()">Create Post</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="assets/js/admin.js"></script>
  <script>
    // Check if logged in
    if (!sessionStorage.getItem('adminLoggedIn')) {
      window.location.href = 'login.html';
    }

    // Initialize with today's date
    document.getElementById('postDate').valueAsDate = new Date();

    let posts = JSON.parse(localStorage.getItem('blogPosts')) || [];

    function toggleNewPostForm() {
      const form = document.getElementById('postForm');
      form.style.display = form.style.display === 'none' ? 'block' : 'none';
      if (form.style.display === 'block') {
        document.getElementById('postTitle').focus();
      } else {
        clearPostForm();
      }
    }

    function clearPostForm() {
      document.getElementById('postTitle').value = '';
      document.getElementById('postCategory').value = '';
      document.getElementById('postExcerpt').value = '';
      document.getElementById('postBody').value = '';
      document.getElementById('postDate').valueAsDate = new Date();
    }

    function handleSavePost(e) {
      e.preventDefault();

      const post = {
        id: Date.now(),
        title: document.getElementById('postTitle').value,
        category: document.getElementById('postCategory').value,
        excerpt: document.getElementById('postExcerpt').value,
        body: document.getElementById('postBody').value,
        date: document.getElementById('postDate').value,
        createdAt: new Date().toISOString()
      };

      posts.unshift(post);
      localStorage.setItem('blogPosts', JSON.stringify(posts));

      showAlert('Post saved successfully!', 'success');
      clearPostForm();
      toggleNewPostForm();
      renderPosts();
    }

    function deletePost(id) {
      if (confirm('Are you sure you want to delete this post?')) {
        posts = posts.filter(p => p.id !== id);
        localStorage.setItem('blogPosts', JSON.stringify(posts));
        showAlert('Post deleted', 'success');
        renderPosts();
      }
    }

    function renderPosts() {
      const container = document.getElementById('postsList');

      if (posts.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📝</div>
            <div class="empty-title">No posts yet</div>
            <div class="empty-description">Create your first blog post to get started</div>
            <button class="btn btn-primary" onclick="toggleNewPostForm()">Create Post</button>
          </div>
        `;
        return;
      }

      container.innerHTML = posts.map(post => `
        <div class="post-card" style="background: white; padding: 24px; border: 1px solid #E8E4DC; border-radius: 12px; margin-bottom: 16px;">
          <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px;">
            <div style="flex: 1;">
              <span style="display: inline-block; background: #E8E4DC; color: #1A1A2E; padding: 4px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; margin-bottom: 8px;">${post.category}</span>
              <h3 style="margin: 8px 0 4px 0; font-size: 16px;">${post.title}</h3>
              <p style="color: #A0A0A0; font-size: 13px;">${new Date(post.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</p>
            </div>
            <div style="display: flex; gap: 8px;">
              <button class="btn btn-sm btn-secondary" onclick="editPost(${post.id})">Edit</button>
              <button class="btn btn-sm btn-danger" onclick="deletePost(${post.id})">Delete</button>
            </div>
          </div>
          <p style="color: #6B6B6B; font-size: 14px; line-height: 1.6;">${post.excerpt}</p>
        </div>
      `).join('');
    }

    function editPost(id) {
      const post = posts.find(p => p.id === id);
      if (post) {
        document.getElementById('postTitle').value = post.title;
        document.getElementById('postCategory').value = post.category;
        document.getElementById('postExcerpt').value = post.excerpt;
        document.getElementById('postBody').value = post.body;
        document.getElementById('postDate').value = post.date;

        // Delete and re-add pattern (simpler than edit)
        deletePost(id);
        toggleNewPostForm();
        document.getElementById('postTitle').focus();
      }
    }

    // Initialize
    renderPosts();
  </script>
</body>
</html>
