<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leads Dashboard — Latisha Blake Admin</title>
  <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>
  <div class="admin-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Latisha Blake</h2>
        <p class="sidebar-subtitle">Admin</p>
      </div>
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-item">Dashboard</a>
        <a href="blog.html" class="nav-item">Blog</a>
        <a href="sales.html" class="nav-item">Sales</a>
        <a href="leads.html" class="nav-item active">Leads</a>
      </nav>
      <div class="sidebar-footer">
        <button class="logout-btn" onclick="logout()">Sign Out</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px;">
          <div>
            <h1>Leads</h1>
            <p class="subtitle">View and manage form submissions</p>
          </div>
          <div style="display: flex; gap: 12px;">
            <input type="text" id="searchInput" placeholder="Search leads..." style="padding: 10px 16px; border: 1px solid #E8E4DC; border-radius: 8px; font-size: 14px; width: 200px;">
            <select id="filterSelect" style="padding: 10px 16px; border: 1px solid #E8E4DC; border-radius: 8px; font-size: 14px;">
              <option value="">All Types</option>
              <option value="valuation">Valuation</option>
              <option value="contact">Contact</option>
            </select>
          </div>
        </div>

        <!-- Leads List -->
        <div id="leadsList">
          <div class="empty-state">
            <div class="empty-icon">📧</div>
            <div class="empty-title">No leads yet</div>
            <div class="empty-description">Form submissions will appear here</div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="assets/js/admin.js"></script>
  <script>
    // Check if logged in
    if (!sessionStorage.getItem('adminLoggedIn')) {
      window.location.href = 'login.html';
    }

    let allLeads = JSON.parse(localStorage.getItem('formLeads')) || [];
    let filteredLeads = [...allLeads];

    // Search functionality
    document.getElementById('searchInput').addEventListener('input', (e) => {
      filterLeads();
    });

    // Filter by type
    document.getElementById('filterSelect').addEventListener('change', (e) => {
      filterLeads();
    });

    function filterLeads() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const typeFilter = document.getElementById('filterSelect').value;

      filteredLeads = allLeads.filter(lead => {
        const matchesSearch =
          lead.name.toLowerCase().includes(searchTerm) ||
          lead.email.toLowerCase().includes(searchTerm) ||
          lead.phone.toLowerCase().includes(searchTerm) ||
          (lead.address && lead.address.toLowerCase().includes(searchTerm));

        const matchesType = !typeFilter || lead.formType === typeFilter;

        return matchesSearch && matchesType;
      });

      renderLeads();
    }

    function markAsContacted(id) {
      const lead = allLeads.find(l => l.id === id);
      if (lead) {
        lead.contacted = !lead.contacted;
        localStorage.setItem('formLeads', JSON.stringify(allLeads));
        renderLeads();
      }
    }

    function deleteLead(id) {
      if (confirm('Delete this lead? This cannot be undone.')) {
        allLeads = allLeads.filter(l => l.id !== id);
        localStorage.setItem('formLeads', JSON.stringify(allLeads));
        filterLeads();
      }
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        showAlert('Copied to clipboard!', 'success');
      });
    }

    function renderLeads() {
      const container = document.getElementById('leadsList');

      if (filteredLeads.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📧</div>
            <div class="empty-title">No leads found</div>
            <div class="empty-description">Try adjusting your search or filters</div>
          </div>
        `;
        return;
      }

      container.innerHTML = filteredLeads.map(lead => `
        <div style="background: white; padding: 24px; border: 1px solid #E8E4DC; border-radius: 12px; margin-bottom: 16px;">
          <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 16px;">
            <div style="flex: 1;">
              <div style="display: flex; gap: 12px; align-items: center; margin-bottom: 8px;">
                <span style="display: inline-block; background: ${lead.formType === 'valuation' ? '#FFF3CD' : '#D1ECF1'}; color: ${lead.formType === 'valuation' ? '#856404' : '#0C5460'}; padding: 4px 12px; border-radius: 6px; font-size: 12px; font-weight: 600;">${lead.formType === 'valuation' ? 'Valuation' : 'Contact'}</span>
                ${lead.contacted ? '<span style="display: inline-block; background: #D4EDDA; color: #155724; padding: 4px 12px; border-radius: 6px; font-size: 12px; font-weight: 600;">✓ Contacted</span>' : ''}
              </div>
              <h3 style="margin: 0 0 4px 0; font-size: 16px;">${lead.name}</h3>
              <p style="margin: 0; color: #A0A0A0; font-size: 13px;">${new Date(lead.timestamp).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' })}</p>
            </div>
            <div style="display: flex; gap: 8px;">
              ${lead.contacted ? '<button class="btn btn-sm btn-secondary" onclick="markAsContacted(${lead.id})">Mark Pending</button>' : '<button class="btn btn-sm btn-primary" onclick="markAsContacted(${lead.id})">Mark Contacted</button>'}
              <button class="btn btn-sm btn-danger" onclick="deleteLead(${lead.id})">Delete</button>
            </div>
          </div>

          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; padding: 16px 0; border-top: 1px solid #E8E4DC; border-bottom: 1px solid #E8E4DC; margin: 16px 0;">
            <div>
              <p style="margin: 0; font-size: 12px; color: #A0A0A0; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; font-weight: 600;">Phone</p>
              <p style="margin: 0; font-size: 15px; font-weight: 500;">
                <a href="tel:${lead.phone}" style="color: #C9A84C; text-decoration: none;">${lead.phone}</a>
                <button onclick="copyToClipboard('${lead.phone}')" style="background: none; border: none; color: #A0A0A0; cursor: pointer; font-size: 12px; margin-left: 8px;">📋</button>
              </p>
            </div>
            <div>
              <p style="margin: 0; font-size: 12px; color: #A0A0A0; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; font-weight: 600;">Email</p>
              <p style="margin: 0; font-size: 15px; font-weight: 500;">
                <a href="mailto:${lead.email}" style="color: #C9A84C; text-decoration: none;">${lead.email}</a>
                <button onclick="copyToClipboard('${lead.email}')" style="background: none; border: none; color: #A0A0A0; cursor: pointer; font-size: 12px; margin-left: 8px;">📋</button>
              </p>
            </div>
            ${lead.address ? `<div>
              <p style="margin: 0; font-size: 12px; color: #A0A0A0; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; font-weight: 600;">Address</p>
              <p style="margin: 0; font-size: 15px; font-weight: 500;">${lead.address}</p>
            </div>` : ''}
            ${lead.bestTime ? `<div>
              <p style="margin: 0; font-size: 12px; color: #A0A0A0; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; font-weight: 600;">Best Time</p>
              <p style="margin: 0; font-size: 15px; font-weight: 500;">${lead.bestTime}</p>
            </div>` : ''}
          </div>

          ${lead.message ? `<div style="margin-top: 16px;">
            <p style="margin: 0 0 8px 0; font-size: 12px; color: #A0A0A0; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600;">Message</p>
            <p style="margin: 0; font-size: 14px; color: #6B6B6B; line-height: 1.6;">${lead.message}</p>
          </div>` : ''}
        </div>
      `).join('');
    }

    // Override the form submission handler to save to localStorage
    window.addEventListener('storage', () => {
      allLeads = JSON.parse(localStorage.getItem('formLeads')) || [];
      filterLeads();
    });

    // Initialize
    renderLeads();
  </script>
</body>
</html>
